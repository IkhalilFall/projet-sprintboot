spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/gestion_scolaire
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: 900000
    refresh-token-expiration: 604800000

upload:
  dir: uploads/